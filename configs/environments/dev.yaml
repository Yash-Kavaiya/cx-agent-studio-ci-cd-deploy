gcp:
  project_id: "your-dev-project-id"
  region: "us-central1"
  multi_region: "us"

ces:
  app_id: "your-dev-app-id"
  agent_id: ""
  api_endpoint: "ces.googleapis.com"
  oauth_scope: "https://www.googleapis.com/auth/ces"

storage:
  bucket_name: "your-dev-project-id-agent-exports"
  export_prefix: "agent-exports/dev"
  backup_prefix: "agent-backups/dev"

deployment:
  environment: "dev"
  auto_rollback: false
  smoke_test_timeout: 60
  max_retries: 3

overrides:
  data_store_uris: {}
  service_endpoints: {}
  storage_buckets: {}
  custom_settings:
    log_level: "DEBUG"
    enable_debug_mode: true

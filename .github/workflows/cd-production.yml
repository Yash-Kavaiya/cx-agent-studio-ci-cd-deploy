name: CD - Deploy to Production

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      agent_app_id:
        description: "CX Agent Studio App ID to deploy"
        required: false
        type: string
      skip_evaluation:
        description: "Skip agent evaluation (not recommended)"
        required: false
        type: boolean
        default: false

env:
  PYTHON_VERSION: "3.11"
  DEPLOY_ENV: production

permissions:
  contents: read
  id-token: write

jobs:
  pre-deploy-evaluation:
    name: Pre-Deploy Agent Evaluation
    if: ${{ !inputs.skip_evaluation }}
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Run agent evaluation suite
        run: |
          python -m src.cli evaluate-agent \
            --project-id=${{ secrets.GCP_PROJECT_ID_STAGING }} \
            --app-id=${{ secrets.CES_APP_ID_STAGING }} \
            --test-suite=configs/evaluation/production_readiness.yaml \
            --min-score=0.85 \
            --region=us \
            --output=evaluation-report.json

      - name: Upload evaluation report
        uses: actions/upload-artifact@v4
        with:
          name: evaluation-report
          path: evaluation-report.json

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [pre-deploy-evaluation]
    if: always() && (needs.pre-deploy-evaluation.result == 'success' || needs.pre-deploy-evaluation.result == 'skipped')
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_PROD }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID_PRODUCTION }}

      - name: Enable CES API
        run: |
          gcloud services enable ces.googleapis.com --project=${{ secrets.GCP_PROJECT_ID_PRODUCTION }} || true

      - name: Create pre-deployment backup
        run: |
          python -m src.cli export-agent \
            --project-id=${{ secrets.GCP_PROJECT_ID_PRODUCTION }} \
            --app-id=${{ secrets.CES_APP_ID_PRODUCTION }} \
            --output-dir=agents/backup \
            --backup-to-gcs \
            --gcs-bucket=${{ secrets.GCS_BACKUP_BUCKET }} \
            --region=us

      - name: Export agent from staging
        run: |
          python -m src.cli export-agent \
            --project-id=${{ secrets.GCP_PROJECT_ID_STAGING }} \
            --app-id=${{ secrets.CES_APP_ID_STAGING }} \
            --output-dir=agents/exported \
            --region=us

      - name: Transform agent config for production
        run: |
          python -m src.cli transform-config \
            --agent-dir=agents/exported \
            --env-config=configs/environments/production.yaml

      - name: Validate agent before deployment
        run: |
          python -m src.cli validate-agent \
            --agent-dir=agents/exported \
            --strict

      - name: Import agent to production
        id: deploy
        run: |
          python -m src.cli import-agent \
            --project-id=${{ secrets.GCP_PROJECT_ID_PRODUCTION }} \
            --app-id=${{ secrets.CES_APP_ID_PRODUCTION }} \
            --agent-dir=agents/exported \
            --region=us

      - name: Run production smoke tests
        id: smoke-test
        run: |
          python -m src.cli smoke-test \
            --project-id=${{ secrets.GCP_PROJECT_ID_PRODUCTION }} \
            --app-id=${{ secrets.CES_APP_ID_PRODUCTION }} \
            --region=us

      - name: Rollback on failure
        if: failure() && steps.deploy.outcome == 'success'
        run: |
          echo "::warning::Deployment failed post-import. Initiating rollback..."
          python -m src.cli import-agent \
            --project-id=${{ secrets.GCP_PROJECT_ID_PRODUCTION }} \
            --app-id=${{ secrets.CES_APP_ID_PRODUCTION }} \
            --agent-dir=agents/backup \
            --region=us
          echo "::error::Rollback completed. Please investigate the failure."

      - name: Archive deployment artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-deployment-${{ github.sha }}
          path: |
            agents/exported/
            agents/backup/
          retention-days: 90

      - name: Notify deployment status
        if: always()
        run: |
          STATUS="${{ job.status }}"
          TAG="${GITHUB_REF#refs/tags/}"
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
              -H 'Content-Type: application/json' \
              -d "{\"text\":\"🚀 CX Agent Studio Production Deploy: ${STATUS} | Tag: ${TAG} | Commit: ${{ github.sha }} | Actor: ${{ github.actor }}\"}"
          fi
          echo "Production deployment status: ${STATUS}"
